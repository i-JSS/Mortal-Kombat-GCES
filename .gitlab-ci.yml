stages:
  - Build
  - Test
  - Lint

Build:
  stage: Build
  image: docker:20.10.24 
  services:
    - docker:20.10.24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker compose -f docker-compose.yml build

Test:
  stage: Test
  image: node:20-alpine
  script:
    - cd server
    - npm ci
    - npm test
    - cd ../game
    - echo "Teste unitário do filters.threshold como não tem node no client, rodou junto do server!"

Lint:
  stage: Lint
  image: node:20-alpine
  script:
    - cd server
    - npm ci
    - npx eslint .