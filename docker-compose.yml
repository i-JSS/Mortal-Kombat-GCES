version: '3.8'

services:
  postgresql:
    image: bitnami/postgresql:latest
    container_name: mkjs_postgresql
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=mkjs
    volumes:
      - mkjs_pg_data:/bitnami/postgresql
      - ./postgresql/:/docker-entrypoint-initdb.d
    networks:
      - mkjs_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docker -d mkjs" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: mkjs_server_dev
    environment:
      - NODE_ENV=development
      - PORT=55555
    volumes:
      - ./server:/usr/src/app/server
      - /usr/src/app/server/node_modules
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - mkjs_network

  client:
    build:
      context: ./game
      dockerfile: Dockerfile.dev
    container_name: mkjs_client_dev
    environment:
      - NODE_ENV=development
      - PORT=8080
    volumes:
      - ./game:/usr/src/app/game
      - /usr/src/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      - server
    networks:
      - mkjs_network

networks:
  mkjs_network:
    driver: bridge

volumes:
  mkjs_pg_data:
